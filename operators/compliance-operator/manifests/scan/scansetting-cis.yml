---
apiVersion: compliance.openshift.io/v1alpha1
autoApplyRemediations: false
autoUpdateRemediations: false
kind: ScanSetting
maxRetryOnTimeout: 3
metadata:
  name: ocp4-cis
  namespace: openshift-compliance
rawResultStorage:
  nodeSelector:
    node-role.kubernetes.io/worker: ""
  # storageClassName: gp3-csi  # uncomment and set if your cluster does not have a default StorageClass
  pvAccessModes:
  - ReadWriteOnce
  rotation: 3
  size: 1Gi
  tolerations:
  - operator: Exists
    key: node-role.kubernetes.io/infra
roles:
  - master
  - worker
scanTolerations:
- operator: Exists
schedule: 0 2 * * *
showNotApplicable: false
strictNodeScan: true
timeout: 30m
