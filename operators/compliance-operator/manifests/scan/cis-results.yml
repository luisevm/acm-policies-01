# =============================================================================
# CIS ComplianceCheckResult — FAIL detection
#
# Reports non-compliant when any ComplianceCheckResult for the CIS suite
# has check-status: FAIL. This surfaces individual failing CIS controls
# in the ACM Governance dashboard as policy violations.
#
# Pattern from the ACM policy-collection:
# https://github.com/open-cluster-management-io/policy-collection/blob/main/stable/CM-Configuration-Management/policy-compliance-operator-cis-scan.yaml
# =============================================================================
apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: cis-results
spec:
  remediationAction: inform
  severity: high
  object-templates:
    - complianceType: mustnothave
      objectDefinition:
        apiVersion: compliance.openshift.io/v1alpha1
        kind: ComplianceCheckResult
        metadata:
          namespace: openshift-compliance
          labels:
            compliance.openshift.io/check-status: FAIL
            compliance.openshift.io/suite: cis-compliance
