# =============================================================================
# Kubeadmin Secret Removal — Enforce
#
# DESTRUCTIVE: This policy DELETES the kubeadmin secret from kube-system.
# Once removed, the kubeadmin user can no longer authenticate.
# This action is irreversible without reinstalling the cluster.
#
# Only applied to clusters labelled kubeadmin-enforce=true.
# Before labelling a cluster, verify that:
#   1. An identity provider (OAuth, LDAP, etc.) is configured.
#   2. At least one user has cluster-admin privileges via that provider.
#   3. You can log in with that user: oc login -u <user>
#
# To enforce on a specific cluster:
#   oc label managedcluster <cluster-name> kubeadmin-enforce=true --overwrite
#
# To stop enforcing (does NOT restore the secret):
#   oc label managedcluster <cluster-name> kubeadmin-enforce-
# =============================================================================
apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: kubeadmin-remove-enforce
spec:
  remediationAction: enforce
  severity: critical
  object-templates:
    - complianceType: mustnothave
      objectDefinition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: kubeadmin
          namespace: kube-system
