apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: rbac-policies
policyDefaults:
  namespace: acm-policies
  remediationAction: inform
  severity: critical
  consolidateManifests: false
  standards:
    - CIS OpenShift Container Platform 4 Benchmark
    - PCI DSS
  categories:
    - Access Control
  controls:
    - AC-6 Least Privilege
    - AC-3 Access Enforcement
    - CM-7 Least Functionality
    - PCI-DSS-7.2 Access Control Systems
    - PCI-DSS-7.3 Access Control Mechanisms
  namespaceSelector:
    exclude:
      - "openshift-*"
      - "kube-*"
      - "default"
      - "hypershift"
    include:
      - "*"
  policySets:
    - rbac
  generatePlacementWhenInSet: false

policies:
  - name: cm-rbac-exceptions-exists
    manifests:
      - path: manifests/cm-rbac-exceptions.yaml
    remediationAction: enforce
    severity: low

  - name: cis-cluster-admin
    manifests:
      - path: manifests/cis-cluster-admin.yaml
    severity: critical

  - name: sa-token-restriction
    manifests:
      - path: manifests/cis-sa-token-restriction.yaml
    severity: medium

  - name: detect-anonymous-and-wildcard-rbac
    description: >-
      Audit-only checks that flag dangerous RBAC patterns: ClusterRoleBindings
      granting access to unauthenticated or anonymous users, and wildcard Roles
      in user namespaces. Addresses CIS-OCP 5.1.1 / 5.1.2 / 5.1.4 / 5.2.10
      and PCI DSS 7.3 (deny-all default access control) / 7.2 (least privilege).
      Remediation is inform-only — RBAC changes require deliberate human review.
    remediationAction: inform
    severity: high
    standards:
      - CIS OpenShift Container Platform 4 Benchmark
      - PCI DSS
    categories:
      - Access Control
    controls:
      - AC-6 Least Privilege
      - AC-3 Access Enforcement
      - CM-7 Least Functionality
      - PCI-DSS-7.2 Access Control Systems
      - PCI-DSS-7.3 Access Control Mechanisms
    manifests:
      - path: manifests/cis-rbac-controls.yaml

policySets:
  - name: rbac
    description: "CIS Kubernetes Benchmark 5.1 — RBAC and Service Accounts (inform)"
    generatePolicySetPlacement: false
