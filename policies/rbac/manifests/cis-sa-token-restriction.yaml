
# =============================================================================
# CIS-OCP 5.1.5 — Ensure default service accounts are not bound to active cluster roles
# CIS-OCP 5.1.6 — Ensure service account tokens are not automatically mounted where not needed
# PCI DSS 7.2   — Access to system components assigned based on least privilege / need-to-know
# PCI DSS 8.2.2 — Service/system/application accounts managed and cannot be used interactively
# PCI DSS 8.6   — System/application account credentials strictly controlled
#
# Enforced: sets automountServiceAccountToken: false on the 'default' SA in every
# user namespace so tokens are not injected unless a pod explicitly requests them.
#
# By default, Kubernetes mounts a SA token into every pod. If the workload
# doesn't need API access, this token is an unnecessary credential.
#
# Platform namespaces are excluded because their default SAs are managed
# by OpenShift/ACM operators and may intentionally need tokens.
#
# Non-compliant if default SA in any user namespace lacks
# automountServiceAccountToken: false.
# =============================================================================
apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: sa-token-restriction
spec:
  remediationAction: inform
  severity: medium
  namespaceSelector:
    exclude:
      - "openshift"
      - "openshift-*"
      - "kube-*"
      - "hive"
      - "multicluster-engine"
      - "open-cluster-management"
      - "open-cluster-management-*"
      - "multicluster*"
      - "default"
      - "cert-*"
      - "catalogd-*"
      - "costmanagement-*"
      - "external-dns-*"
      - "node-observability-*"
      - "redhat-*"
      - "rhdh-*"
      - "submariner-*"
      - "hive-*"
      - "stackrox"
      - "aap"
      - "ack-system"
      - "metallb-system"
      - "mtr"
      - "service-telemetry"
    include:
      - "*"
  object-templates:
    - complianceType: musthave
      objectDefinition:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: default
        automountServiceAccountToken: false
