# CIS-OCP 5.1.1 — Ensure cluster-admin role is only used where required
# CIS-OCP 5.1.2 — Minimize access to secrets
# CIS-OCP 5.1.4 — Minimize access to create pods
# CIS-OCP 5.2.10 — Ensure no RBAC policies allow wildcard use
# PCI DSS 7.2   — Access to system components assigned based on least privilege
# PCI DSS 7.3   — Access to system components controlled via an access control system
#
# inform-only: flags dangerous RBAC bindings and wildcard roles without auto-remediating
# RBAC objects — those require deliberate human review.

# --- Check 1: no ClusterRoleBinding grants rights to unauthenticated/anonymous users ---
# Uses object-templates-raw to skip known-safe OpenShift default CRBs.
# Any other CRB with system:unauthenticated or system:anonymous subjects is flagged.
#
# TRUSTED ENTITIES: to suppress a false positive, add the CRB name to $allowedCRBs below.

# CRB and CR can be whitlisted in this policy itself
#Allowed list of ClusterRoleBindings - that are allowed to not comply with the Policy 
#    {{- $allowedCRBs := list
#          "system:openshift:public-info-viewer"
#          "system:public-info-viewer"
#    }}

#Allowed list of ClusterRoles - that are allowed to not comply with the Policy 
#   {{- /* ---- Trusted Roles: add "namespace/rolename" entries to skip ---- */ -}}
#    {{- $allowedRoles := list }}

apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: rbac-no-unauth-access
spec:
  remediationAction: inform
  severity: critical
  object-templates-raw: |
    {{- /* ---- Trusted CRB names (add entries to skip) ---- */ -}}
    {{- $allowedCRBs := list
          "system:openshift:public-info-viewer"
          "system:public-info-viewer"
          "open-cluster-management:managedclusterset:view:managedcluster:cluster1"
          "open-cluster-management:managedclusterset:view:managedcluster:local-cluster"
          "test-unauth-access"
    }}
    {{- range $crb := (lookup "rbac.authorization.k8s.io/v1" "ClusterRoleBinding" "" "").items }}
    {{- if not (has $crb.metadata.name $allowedCRBs) }}
    {{- range $subj := $crb.subjects }}
    {{- if or (and (eq $subj.kind "Group") (eq $subj.name "system:unauthenticated")) (and (eq $subj.kind "User") (eq $subj.name "system:anonymous")) }}
    - complianceType: mustnothave
      objectDefinition:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: '{{ $crb.metadata.name }}'
    {{- end }}
    {{- end }}
    {{- end }}
    {{- end }}
---
# --- Check 2: no user-namespace Role allows wildcard verbs on all resources ---
# This catches over-privileged roles that would allow secrets/pod access and more.
# Platform namespaces are excluded by prefix/name. User namespaces are scanned.
#
# TRUSTED ENTITIES: to suppress a false positive, add "namespace/rolename" to
# $allowedRoles below (e.g. "my-ns/my-admin-role").
apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: rbac-no-wildcard-roles
spec:
  remediationAction: inform
  severity: high
  object-templates-raw: |
    {{- /* ---- Trusted Roles: add "namespace/rolename" entries to skip ---- */ -}}
    {{- $allowedRoles := list
          "namespace/rolename"
    }}

    {{- /* Platform namespace prefixes and exact names to exclude from scanning */ -}}
    {{- $exclPrefixes := list "openshift" "kube-" "open-cluster-management-" "multicluster" "cert-" "catalogd-" "costmanagement-" "external-dns-" "node-observability-" "redhat-" "rhdh-" "submariner-" "hive-" }}
    {{- $exclExact := list "hive" "multicluster-engine" "open-cluster-management" "default" "stackrox" "aap" "ack-system" "metallb-system" "mtr" "service-telemetry" }}

    {{- range $ns := (lookup "v1" "Namespace" "" "").items }}
      {{- $nsName := $ns.metadata.name }}
      {{- $skip := false }}
      {{- range $p := $exclPrefixes }}
        {{- if hasPrefix $p $nsName }}{{ $skip = true }}{{ end }}
      {{- end }}
      {{- if has $nsName $exclExact }}{{ $skip = true }}{{ end }}

      {{- if not $skip }}
        {{- range $role := (lookup "rbac.authorization.k8s.io/v1" "Role" $nsName "").items }}
          {{- $key := printf "%s/%s" $nsName $role.metadata.name }}
          {{- if not (has $key $allowedRoles) }}
            {{- range $rule := (default (list) $role.rules) }}
              {{- if and (has "*" (default (list) $rule.apiGroups)) (has "*" (default (list) $rule.resources)) (has "*" (default (list) $rule.verbs)) }}
    - complianceType: mustnothave
      objectDefinition:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          name: '{{ $role.metadata.name }}'
          namespace: '{{ $nsName }}'
              {{- end }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}
