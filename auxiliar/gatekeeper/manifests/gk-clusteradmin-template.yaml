# =============================================================================
# ConstraintTemplate: K8sClusterAdminBinding
#
# Flags ClusterRoleBindings that reference the built-in cluster-admin
# ClusterRole. No referential data is needed — the check is based
# solely on the CRB's roleRef.
#
# Parameters:
#   allowedBindings  — CRB names to skip (known-good bindings)
#   excludePrefixes  — name prefixes to skip (e.g. "system:")
# =============================================================================
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sclusteradminbinding
  annotations:
    policy.open-cluster-management.io/severity: high
spec:
  crd:
    spec:
      names:
        kind: K8sClusterAdminBinding
      validation:
        openAPIV3Schema:
          type: object
          properties:
            allowedBindings:
              type: array
              items:
                type: string
              description: ClusterRoleBinding names to exclude from evaluation
            excludePrefixes:
              type: array
              items:
                type: string
              description: Name prefixes to exclude (e.g. "system:")
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sclusteradminbinding

        violation[{"msg": msg}] {
          input.review.object.roleRef.kind == "ClusterRole"
          input.review.object.roleRef.name == "cluster-admin"
          name := input.review.object.metadata.name
          not is_excluded(name)
          msg := sprintf("ClusterRoleBinding '%v' grants the cluster-admin ClusterRole", [name])
        }

        is_excluded(name) {
          name == input.parameters.allowedBindings[_]
        }

        is_excluded(name) {
          prefix := input.parameters.excludePrefixes[_]
          startswith(name, prefix)
        }
